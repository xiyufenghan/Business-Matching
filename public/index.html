<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商达撮合系统</title>
  <link rel="stylesheet" href="/css/style.css?v=20260505zh">
</head>
<body>
  <div class="app-container" id="app-container" style="display:none">
    <!-- Mobile Top Bar -->
    <header class="mobile-topbar">
      <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <h1 class="mobile-title">商达撮合</h1>
      <div class="mobile-user" id="mobile-user-badge"></div>
    </header>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>商达撮合</h1>
        <p>视频号商家与达人匹配平台</p>
        <button class="sidebar-close" onclick="closeSidebar()">&times;</button>
      </div>
      <nav class="nav-menu" id="nav-menu"></nav>
      <div class="sidebar-footer">
        <div id="user-info" style="padding:12px 16px;font-size:12px;color:#94a3b8;border-top:1px solid rgba(255,255,255,0.1)"></div>
        <button class="sidebar-logout-btn" onclick="logout()">退出登录</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="page-container"></div>
    </main>
  </div>

  <!-- Login Page -->
  <div class="login-page" id="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        </div>
        <h1>商达撮合系统</h1>
        <p>视频号商家与达人匹配平台</p>
      </div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>账号</label>
          <input type="text" id="login-username" placeholder="手机号 / 视频号账号 / 管理员账号" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <div id="login-error" class="login-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:12px" id="login-btn">登 录</button>
      </form>
    </div>
  </div>

  <!-- Activate Page（邀请激活页，通过 /?activate=xxx 进入）-->
  <div class="login-page" id="activate-page" style="display:none">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo" style="background:#fef3c7">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="1.5"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <h1>激活账号</h1>
        <p id="activate-subtitle">正在验证邀请链接...</p>
      </div>
      <div id="activate-loading" style="text-align:center;padding:20px;color:#64748b">加载中...</div>
      <div id="activate-error" style="display:none;padding:14px;background:#fee2e2;color:#b91c1c;border-radius:8px;font-size:13px;line-height:1.5"></div>
      <form id="activate-form" onsubmit="handleActivate(event)" style="display:none">
        <div class="form-group">
          <label id="activate-verify-label">确认公司名称</label>
          <input type="text" id="activate-verify-value" placeholder="请完整输入以确认身份" required>
          <div class="form-hint" id="activate-verify-hint" style="font-size:12px;color:#94a3b8;margin-top:4px"></div>
        </div>
        <div class="form-group">
          <label>设置密码（至少 6 位）</label>
          <input type="password" id="activate-password" minlength="6" placeholder="请输入新密码" required>
        </div>
        <div class="form-group">
          <label>再次输入密码</label>
          <input type="password" id="activate-password2" minlength="6" placeholder="请再次输入" required>
        </div>
        <div id="activate-form-error" class="login-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:12px">激活账号</button>
        <div style="text-align:center;margin-top:14px">
          <a href="/" style="font-size:12px;color:#64748b">已有账号？返回登录</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">标题</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

<script src="/lib/echarts.min.js"></script>
<script src="/js/app.js?v=20260505zh"></script>
</body>
</html>
