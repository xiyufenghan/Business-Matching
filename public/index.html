<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商达撮合系统</title>
<link rel="stylesheet" href="/css/style.css?v=20260430m">
</head>
<body>
  <div class="app-container" id="app-container" style="display:none">
    <!-- Mobile Top Bar -->
    <header class="mobile-topbar">
      <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <h1 class="mobile-title">🤝 商达撮合</h1>
      <div class="mobile-user" id="mobile-user-badge"></div>
    </header>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>🤝 商达撮合</h1>
        <p>视频号商家与达人匹配平台</p>
        <button class="sidebar-close" onclick="closeSidebar()">&times;</button>
      </div>
      <nav class="nav-menu" id="nav-menu"></nav>
      <div class="sidebar-footer">
        <div id="user-info" style="padding:12px 16px;font-size:12px;color:#94a3b8;border-top:1px solid rgba(255,255,255,0.1)"></div>
        <button class="sidebar-logout-btn" onclick="logout()">🚪 退出登录</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="page-container"></div>
    </main>
  </div>

  <!-- Login Page -->
  <div class="login-page" id="login-page">
    <div class="login-card">
      <div class="login-header">
        <h1>🤝 商达撮合系统</h1>
        <p>视频号商家与达人匹配平台</p>
      </div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>🧑‍💼 登录身份</label>
          <select id="login-role" required onchange="onLoginRoleChange()">
            <option value="admin">🛡️ 管理员</option>
            <option value="merchant">🏪 商家</option>
            <option value="influencer">⭐ 达人</option>
          </select>
        </div>
        <div class="form-group" id="login-username-group">
          <label>👤 用户名</label>
          <input type="text" id="login-username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group" id="login-admin-select-group" style="display:none">
          <label>🛡️ 选择管理员账号</label>
          <select id="login-admin-select" style="width:100%">
            <option value="">加载中...</option>
          </select>
        </div>
        <div class="form-group" id="login-merchant-select-group" style="display:none">
          <label>🏪 选择商家账号</label>
          <select id="login-merchant-select" style="width:100%">
            <option value="">加载中...</option>
          </select>
        </div>
        <div class="form-group" id="login-influencer-select-group" style="display:none">
          <label>⭐ 选择达人账号</label>
          <select id="login-influencer-select" style="width:100%">
            <option value="">加载中...</option>
          </select>
        </div>
        <div class="form-group">
          <label>🔒 密码</label>
          <input type="password" id="login-password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:12px">🔐 登 录</button>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">标题</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

<script src="/js/app.js?v=20260430q"></script>
</body>
</html>
