<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content=width=device-width,initial-scale=1><title>登录</title><script src=https://cdn.tailwindcss.com></script><style>body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center}.box{background:rgba(255,255,255,.95);border-radius:20px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);width:400px;padding:40px}.inp{width:100%;height:44px;border:1px solid #e2e8f0;border-radius:10px;padding:0 16px;font-size:15px;background:#f8fafc}.inp:focus{border-color:#8b5cf6}.btn{width:100%;height:46px;border:none;border-radius:10px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;font-size:16px;font-weight:600;cursor:pointer}.err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}</style></head><body><div class=box><div style=text-align:center;margin-bottom:32px><div style=width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);display:inline-flex;margin:0 auto 12px><svg viewBox=0 0 24 24 fill=none stroke=#fff stroke-width=2 style=width:28px;height:28px><path d=M12 2l3 6 6 .9L22 9.6l-5.24 4.86L18.18 22 12 16.8 6.4 19.5 7.5 13.2 3 8.9z></svg></div><h1 style=font-size:22px;font-weight:700>商达撮合管理</h1><p style=font-size:13px;color:#94a3b8>BizMatch</p></div><form id=loginForm onsubmit=return:false><div style=margin-bottom:16px><label style=display:block;font-size:13px;font-weight:500;color:#475569;margin-bottom:6px>用户名</label><input class=inp id=username type=text placeholder=请输入用户名 required autofocus></div><div style=margin-bottom:20px><label style=display:block;font-size:13px;font-weight:500;color:#475569;margin-bottom:6px>密码</label><input class=inp id=password type=password placeholder=请输入密码 required></div><button type=submit class=btn id=btnLogin><span id=btnText>登 录</span></button><div id=errMsg class=err></div><div style=margin-top:20px;text-align:center;font-size:12px;color:#94a3b8>默认账号：<code style=background:#f1f5f9;padding:2px 8px;border-radius:4px;color:#6d28d9>admin / admin123</code></div></form></div><script>const f=document.getElementById("loginForm"),e=document.getElementById("errMsg"),b=document.getElementById("btnLogin"),t=document.getElementById("btnText");f.addEventListener("submit",async(a)=>{a.preventDefault();const u=document.getElementById("username").value.trim(),p=document.getElementById("password").value;if(!u||!p)return showE("请输入用户名和密码");b.disabled=true;t.textContent="登录中...";e.style.display="none";try{const r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||d.detail||"登录失败");localStorage.setItem("bizmatch_token",d.token);localStorage.setItem("bizmatch_user",JSON.stringify(d.user));window.location.href="/static/index.html"}catch(x){showE(x.message)}finally{b.disabled=false;t.textContent="登 录"}});function showE(m){e.textContent=m;e.style.display=""}</script></body></html>
